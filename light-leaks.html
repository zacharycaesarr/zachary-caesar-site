<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Light Leaks — Zachary Caesar. Available now." />
  <title>light leaks. — zachary caesar.</title>
  <link rel="stylesheet" href="assets/css/main.css" />
  <link rel="stylesheet" href="assets/css/light-leaks.css" />
</head>
<body class="ll-page">

  <!-- Ambient orbs + rays (from main.css) -->
  <div class="bg-ambient" aria-hidden="true">
    <div class="orb orb-gold"></div>
    <div class="orb orb-blue"></div>
    <div class="orb orb-red"></div>
    <div class="orb orb-pale"></div>
  </div>
  <div class="bg-ray" aria-hidden="true">
    <div class="ray"></div>
    <div class="ray ray-2"></div>
  </div>

  <!-- ── Topbar (always visible, fixed on this page) ── -->
  <header class="topbar">
    <a class="brand" href="index.html" aria-label="Home">
      <img src="assets/img/logo-black.png" alt="Zachary Caesar"
           onerror="this.style.display='none';this.nextElementSibling.style.display='block'" />
      <span class="brand-fallback" style="display:none">ZC</span>
    </a>
    <nav class="topnav" aria-label="Main navigation">
      <a href="index.html">home</a>
      <a href="light-leaks.html" aria-current="page">light leaks</a>
      <a href="merch.html">shop</a>
      <a href="music.html">music</a>
      <a href="about.html">about</a>
    </nav>
    <div class="topbar-right"></div>
  </header>

  <!-- ════════════════════════════════════════
       PHASE 1-A  Intro title card
       Holds for 2.5s then fades out.
       ════════════════════════════════════════ -->
  <div id="ll-intro" aria-live="polite">
    <div id="ll-intro-title">
      <span>LIGHT</span>
      <span>LEAKS</span>
    </div>
  </div>

  <!-- ════════════════════════════════════════
       PHASE 1-B  Main scene
       Eye → tagline → buttons (reveals after intro)
       ════════════════════════════════════════ -->
  <div id="ll-scene" aria-hidden="true">

    <!-- Large interactive eye -->
    <div id="ll-eye-wrap">
      <svg id="ll-eye-svg" viewBox="0 0 500 250" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <defs>
          <radialGradient id="ll-iris-grad" cx="50%" cy="48%" r="50%">
            <stop offset="0%"   stop-color="#E8C270" />
            <stop offset="22%"  stop-color="#C09040" />
            <stop offset="55%"  stop-color="#7A5820" />
            <stop offset="100%" stop-color="#2E1A06" />
          </radialGradient>
          <radialGradient id="ll-pupil-grad" cx="50%" cy="44%" r="50%">
            <stop offset="0%"   stop-color="#060402" />
            <stop offset="100%" stop-color="#120C04" />
          </radialGradient>
          <radialGradient id="ll-sclera-grad" cx="50%" cy="50%" r="50%">
            <stop offset="0%"   stop-color="#FAF5ED" stop-opacity="0.94" />
            <stop offset="60%"  stop-color="#EFE9DF" stop-opacity="0.84" />
            <stop offset="100%" stop-color="#D8CFC0" stop-opacity="0.72" />
          </radialGradient>
          <clipPath id="ll-eye-clip">
            <path d="M 42,125 Q 250,16 458,125 Q 250,234 42,125 Z"/>
          </clipPath>
          <filter id="ll-soft">
            <feGaussianBlur stdDeviation="0.7"/>
          </filter>
        </defs>

        <!-- Sclera -->
        <ellipse id="ll-sclera" cx="250" cy="125" rx="212" ry="82"
                 fill="url(#ll-sclera-grad)" clip-path="url(#ll-eye-clip)"/>
        <!-- Iris -->
        <circle id="ll-iris" cx="250" cy="125" r="58"
                fill="url(#ll-iris-grad)" filter="url(#ll-soft)"/>
        <!-- Pupil (moves with cursor/touch) -->
        <circle id="ll-pupil" cx="250" cy="125" r="27"
                fill="url(#ll-pupil-grad)"/>
        <!-- Iris detail ring -->
        <circle cx="250" cy="125" r="52"
                fill="none" stroke="rgba(192,144,64,0.30)" stroke-width="1.5"/>
        <!-- Corneal highlight (tracks pupil) -->
        <ellipse id="ll-highlight" cx="234" cy="112" rx="10" ry="7"
                 fill="rgba(255,252,242,0.82)" transform="rotate(-18 234 112)"/>

        <!-- Eyelid strokes -->
        <g clip-path="url(#ll-eye-clip)">
          <path d="M 42,125 Q 250,16 458,125"
                fill="none" stroke="rgba(14,12,8,0.65)" stroke-width="2.5" stroke-linecap="round"/>
          <path d="M 42,125 Q 250,234 458,125"
                fill="none" stroke="rgba(14,12,8,0.42)" stroke-width="1.5" stroke-linecap="round"/>
        </g>

        <!-- Upper lashes -->
        <g stroke="rgba(14,12,8,0.58)" stroke-linecap="round" fill="none">
          <line x1="130" y1="96"  x2="118" y2="81"  stroke-width="1.6"/>
          <line x1="166" y1="78"  x2="157" y2="62"  stroke-width="1.4"/>
          <line x1="206" y1="64"  x2="201" y2="47"  stroke-width="1.4"/>
          <line x1="250" y1="57"  x2="250" y2="39"  stroke-width="1.6"/>
          <line x1="294" y1="64"  x2="299" y2="47"  stroke-width="1.4"/>
          <line x1="334" y1="78"  x2="343" y2="62"  stroke-width="1.4"/>
          <line x1="370" y1="96"  x2="382" y2="81"  stroke-width="1.6"/>
        </g>
      </svg>
    </div><!-- #ll-eye-wrap -->

    <!-- "WATCH THE LIGHT BLEED" — word-by-word blur fade -->
    <div id="ll-tagline" aria-live="polite">
      <span class="ll-word">WATCH</span>
      <span class="ll-word">THE</span>
      <span class="ll-word">LIGHT</span>
      <span class="ll-word">BLEED</span>
    </div>

    <!-- Action buttons — appear one by one, eye gazes at each -->
    <nav id="ll-nav" aria-label="Light Leaks actions">
      <a  class="ll-btn" id="ll-btn-shop"    href="merch.html">[ SHOP THE DROP ]</a>
      <a  class="ll-btn" id="ll-btn-music"   href="music.html">[ HEAR THE MUSIC ]</a>
      <button class="ll-btn" id="ll-btn-examine" type="button">[ EXAMINE SOURCE ]</button>
    </nav>

  </div><!-- #ll-scene -->

  <!-- ════════════════════════════════════════
       PHASE 2  Flashlight / Examine Source
       Activated by clicking [ EXAMINE SOURCE ]
       ════════════════════════════════════════ -->
  <div id="ll-flashlight" aria-hidden="true" role="presentation">

    <!-- Black veil — CSS mask-image punched out by JS to create the flashlight beam -->
    <div id="ll-dark"></div>

    <!-- Hidden texts revealed by the flashlight beam -->
    <!-- These will be replaced with real track titles later -->
    <div id="ll-hidden-layer" aria-hidden="true">
      <span class="ll-rt" style="top:18%;left:12%;--rot:-4">TRACK TITLE 1</span>
      <span class="ll-rt" style="top:34%;left:58%;--rot:3">TRACK TITLE 2</span>
      <span class="ll-rt" style="top:54%;left:24%;--rot:-2">TRACK TITLE 3</span>
      <span class="ll-rt" style="top:70%;left:62%;--rot:5">TRACK TITLE 4</span>
      <span class="ll-rt" style="top:11%;left:50%;--rot:0;font-size:clamp(1rem,4vw,2.2rem)">— LL —</span>
      <span class="ll-rt" style="top:80%;left:16%;--rot:-1;letter-spacing:0.3em">WATCH THE LIGHT BLEED</span>
      <span class="ll-rt" style="top:42%;left:4%;--rot:90;writing-mode:vertical-lr;letter-spacing:0.14em">ZACHARY CAESAR</span>
      <span class="ll-rt" style="top:22%;left:80%;--rot:-3">2026</span>
      <span class="ll-rt" style="top:62%;left:40%;--rot:2;font-size:0.72em;opacity:0.55">light leaks.</span>
      <span class="ll-rt" style="top:88%;left:50%;--rot:0;opacity:0.4;letter-spacing:0.4em">CROOKED SMILE</span>
    </div>

    <!-- Close / reset button -->
    <button id="ll-close" type="button" aria-label="Exit examine mode" title="Exit">×</button>

  </div><!-- #ll-flashlight -->

  <script src="assets/js/main.js"></script>
  <script src="assets/js/noise.js"></script>
  <script src="assets/js/light-leaks.js"></script>
</body>
</html>
