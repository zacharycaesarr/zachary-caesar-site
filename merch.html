<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Shop — Zachary Caesar Light Leaks drop." />
    <title>shop. — zachary caesar.</title>
    <link rel="stylesheet" href="assets/css/main.css" />
    <link rel="stylesheet" href="assets/css/animations.css" />
    <link rel="stylesheet" href="assets/css/shop.css" />
  </head>
  <body>

    <!-- Ambient background orbs -->
    <div class="bg-ambient" aria-hidden="true">
      <div class="orb orb-gold"></div>
      <div class="orb orb-blue"></div>
      <div class="orb orb-red"></div>
      <div class="orb orb-pale"></div>
    </div>
    <div class="bg-ray" aria-hidden="true">
      <div class="ray"></div>
      <div class="ray ray-2"></div>
    </div>

    <header class="topbar">
      <a class="brand" href="index.html" aria-label="Home">
        <img src="assets/img/logo-black.png" alt="Zachary Caesar"
             onerror="this.style.display='none';this.nextElementSibling.style.display='block'" />
        <span class="brand-fallback" style="display:none">ZC</span>
      </a>
      <nav class="topnav" aria-label="Main navigation">
        <a href="index.html">home</a>
        <a href="light-leaks.html">light leaks</a>
        <a href="merch.html" aria-current="page">shop</a>
        <a href="music.html">music</a>
        <a href="about.html">about</a>
      </nav>
      <div class="topbar-right">
        <button class="cart-btn" aria-label="Open cart" id="zc-cart-trigger">
          CART <span class="cart-count" aria-live="polite">0</span>
        </button>
      </div>
    </header>

    <main>

      <div class="drop-header" data-reveal>
        <p class="drop-title">CURRENT DROP</p>
        <h1 class="drop-name">light leaks.</h1>
      </div>

      <!--
        Products load automatically from Shopify (all colors, sizes, prices).
        Optional ribbons/custom images → data/product-overrides.js
        Shopify settings → data/shop-config.js
      -->

      <div class="product-grid" id="zc-product-grid"></div>

    </main>

    <footer class="footer">
      <span class="footer-text">© <span data-year></span> Zachary Caesar</span>
      <span class="footer-text">Crooked Smile Records</span>
    </footer>

    <!-- Cart overlay + drawer -->
    <div id="zc-cart-overlay" aria-hidden="true"></div>
    <aside id="zc-cart-drawer" aria-hidden="true" aria-label="Shopping cart">
      <div class="cart-drawer-head">
        <span class="cart-drawer-title">YOUR CART</span>
        <button type="button" id="zc-cart-close" aria-label="Close cart">×</button>
      </div>
      <p id="zc-cart-demo-banner">
        DEMO MODE — cart works locally. Connect Shopify in data/shop-config.js to accept payments.
      </p>
      <div class="cart-drawer-body">
        <div id="zc-cart-empty">
          <span>YOUR CART IS EMPTY</span>
        </div>
        <div id="zc-cart-items"></div>
      </div>
      <div id="zc-cart-footer" hidden>
        <div class="cart-total-row">
          <span class="cart-total-label">SUBTOTAL</span>
          <span id="zc-cart-total">$0.00</span>
        </div>
        <button type="button" id="zc-cart-checkout">CHECKOUT</button>
      </div>
    </aside>

    <script src="data/shop-config.js"></script>
    <script src="data/product-overrides.js"></script>
    <script src="assets/js/main.js"></script>
    <script src="assets/js/scroll-effects.js"></script>
    <script src="assets/js/gesture.js"></script>
    <script src="assets/js/shopify-client.js"></script>
    <script src="assets/js/cart.js"></script>
    <script src="assets/js/shop.js"></script>
    <script src="assets/js/noise.js"></script>
  </body>
</html>
